version: '3'

services:
  app:
    build: .
    ports:
      - "9000:4000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: student_management
    command: sh -c "sleep 20 && node server.js"

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_management
    # ports:
    #   - "3308:3306"
