services:
  app:
    build: .
    ports:
      - "9001:4000"
    depends_on:
      - mysql
    env_file:
      - .env

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fsdb
    volumes:
      - mysql_data:/var/lib/mysql

  prometheus:
    image: prom/prometheus
    ports:
      - "9092:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  mysql_data: