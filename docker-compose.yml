version: '3'

services:
  app:
    build: .
    ports:
      - "9001:4000"
    depends_on:
      - mysql
    env_file:
      - .env

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fsdb
    volumes:
      - mysql_data:/var/lib/mysql

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    user: root
    privileged: true
    ports:
      - "5001:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    dns:
      - 8.8.8.8
      - 1.1.1.1

  prometheus:
    image: prom/prometheus
    ports:
      - "9092:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  mysql_data:
  jenkins_home: